# ── Drive ─────────────────────────────────────────────────────────────────────
md_id: 100
can_datarate: 1000000   # 1 Mbit/s
gear_ratio: 27.0

# ── Control loop ──────────────────────────────────────────────────────────────
loop_hz: 100

# ── Impedance gains (motor-side) ──────────────────────────────────────────────
# Joint stiffness = imp_kp × gear_ratio² = imp_kp × 729  [Nm/rad]
# Start low and increase gradually.
imp_kp: 0.1
imp_kd: 0.0
smoke_duration_s: 5.0   # how long the smoke impedance hold runs [seconds]

# ── Safety limits ─────────────────────────────────────────────────────────────
max_torque_nm: 0.6
max_velocity_rads: 6.0

# ── Calibration — written by 01_calibrate_limits.py ──────────────────────────
joint_margin_deg: 5.0   # inward margin from each hard stop [joint degrees]

hard_min_rad: -12.0437  # measured hard stops (motor rad, relative to power-on zero)
hard_max_rad: 3.8595
safe_min_rad: -9.6875   # hard stop + margin
safe_max_rad: 1.5033

# ── Calibration sweep tuning (used internally by calibration script) ──────────
step_rad: 0.05
settle_s: 0.03
stop_vel_abs_rads: 0.15
stop_torque_abs_nm: 0.35
stop_confirm_cycles: 15
max_scan_rad: 120.0
